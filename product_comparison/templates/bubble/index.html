<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble - Product Comparison</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-gray-800 mb-8">Bubble - Product Comparison</h1>
        
        <div class="bg-white rounded-lg shadow p-6">
            <form id="compareForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Product URL or Name</label>
                    <input type="text" id="productInput" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="Enter product URL or name">
                </div>
                <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">Compare</button>
            </form>
            
            <div id="results" class="mt-8 hidden">
                <h2 class="text-xl font-semibold mb-4">Comparison Results</h2>
                <div id="resultsContent"></div>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('compareForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('productInput').value;
            const resultsDiv = document.getElementById('results');
            const resultsContent = document.getElementById('resultsContent');
            
            resultsContent.innerHTML = '<p class="text-gray-500">Searching...</p>';
            resultsDiv.classList.remove('hidden');
            
            try {
                const response = await fetch('/api/compare/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ query: input })
                });
                const data = await response.json();
                resultsContent.innerHTML = `<pre class="bg-gray-100 p-4 rounded">${JSON.stringify(data, null, 2)}</pre>`;
            } catch (error) {
                resultsContent.innerHTML = `<p class="text-red-500">Error: ${error.message}</p>`;
            }
        });
    </script>
</body>
</html>
