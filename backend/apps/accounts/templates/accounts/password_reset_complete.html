{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Complete | Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; overflow: hidden; background-color: #0f0c29; }
        .glass-card {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
    </style>
</head>
<body class="h-screen w-full flex items-center justify-center relative">
    <div id="vanta-bg" class="absolute inset-0 -z-10"></div>
    <div class="container mx-auto px-4 relative z-10 flex justify-center">
        <div class="glass-card rounded-2xl p-8 md:p-12 w-full max-w-md text-center" id="reset-card">
            <div class="mb-8 stagger-item">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-emerald-500/10 mb-4 shadow-lg shadow-emerald-500/20 ring-1 ring-emerald-500/20">
                    <i class="fas fa-check-circle text-3xl text-emerald-400"></i>
                </div>
                <h2 class="text-3xl font-bold text-white tracking-tight font-['Poppins']">Success!</h2>
                <p class="text-gray-400 mt-4 text-sm leading-relaxed">
                    Your password has been set. You may go ahead and log in now.
                </p>
            </div>
            
            <div class="mt-8 stagger-item">
                <a href="{% url 'login' %}" class="inline-block w-full py-4 bg-gradient-to-r from-emerald-500 to-teal-600 text-white font-bold rounded-xl shadow-lg shadow-emerald-500/30 hover:shadow-emerald-500/50 transition-all duration-300">
                    Log In
                </a>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
             try {
                VANTA.NET({
                    el: "#vanta-bg", color: 0x00f2fe, backgroundColor: 0x0f0c29,
                    points: 12.00, maxDistance: 22.00, spacing: 16.00
                })
            } catch (e) {}
            gsap.from("#reset-card", { duration: 1, opacity: 0, scale: 0.95, y: 20, ease: "power3.out" });
            gsap.from(".stagger-item", { duration: 0.8, opacity: 0, y: 20, stagger: 0.15, ease: "back.out(1.7)", delay: 0.2 });
        });
    </script>
</body>
</html>
