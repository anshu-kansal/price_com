<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SmartPrice</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9ff;
        }

        .brand {
            font-weight: 800;
            font-size: 22px;
            color: #5b5cff;
        }

        .btn-primary {
            background: linear-gradient(135deg, #5b5cff, #7a5cff);
            border: none;
            border-radius: 12px;
            padding: 8px 18px;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg bg-white shadow-sm px-4 py-3">
    <a class="navbar-brand brand" href="/">🎁 SmartPrice</a>

    <div class="ms-auto d-flex gap-3 align-items-center">
  {% if user.is_authenticated %}
    <span class="fw-semibold">Hi, {{ user.username }}</span>
    <a href="/logout/" class="btn btn-outline-danger btn-sm">Logout</a>
  {% else %}
    <a href="/login/" class="fw-semibold text-decoration-none">Login</a>
    <a href="/register/" class="btn btn-primary">Join Now</a>
  {% endif %}
</div>

</nav>

{% block content %}{% endblock %}

</body>
</html>
