{% for item in items %}
<div class="group relative py-3 mb-2 last:mb-0 border-b border-slate-100 dark:border-zinc-800 last:border-0">
    <div class="flex justify-between items-start gap-3">
        <div class="min-w-0 flex-1">
            <span class="text-slate-900 dark:text-zinc-100 text-xs font-bold truncate block pr-2" title="{{ item.product_name }}">{{ item.product_name }}</span>
            <div class="mt-2 flex items-baseline gap-2">
                <span class="text-sm font-black text-slate-950 dark:text-white font-mono">₹{{ item.current_lowest_price|default:"N/A"|floatformat:2 }}</span>
                <span class="text-[9px] text-slate-400 dark:text-zinc-500 bg-indigo-50 dark:bg-indigo-900/10 px-1.5 py-0.5 rounded font-mono">{{ item.delta }}</span>
            </div>
        </div>
        
        <!-- Remove button -->
        <button hx-post="/scraper/watchlist/toggle/" 
                hx-vals='{"product_id": "{{ item.product_id }}"}' 
                hx-target="closest div.group" 
                hx-swap="outerHTML" 
                class="text-red-500 hover:text-red-600 text-[10px] font-bold uppercase transition">
            Remove
        </button>
    </div>
    
    <div class="mt-3 flex justify-between items-center gap-3">
        <!-- Buy / View Link -->
        {% if item.best_store_url %}
        <a href="{{ item.best_store_url }}" target="_blank" rel="noreferrer"
           class="inline-flex items-center justify-center bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg px-3 py-1.5 text-[10px] font-bold shadow-sm transition">
            Buy Now
        </a>
        {% endif %}

        <!-- Target Setting Form -->
        <div class="flex items-center space-x-2">
            <label class="text-slate-400 dark:text-zinc-500 text-[10px] font-bold uppercase">Target</label>
            <div class="relative">
                <span class="absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-400 text-[10px]">₹</span>
                <input type="number" 
                       name="target_price" 
                       value="{{ item.target_price|default_if_none:'' }}"
                       step="0.01"
                       class="bg-slate-50 dark:bg-zinc-950 border border-slate-200 dark:border-zinc-800 text-slate-800 dark:text-zinc-200 text-xs pl-5 pr-2 py-1 w-20 rounded-lg text-right focus:outline-none focus:border-indigo-500"
                       hx-post="/dashboard/api/watchlist/set-target/"
                       hx-trigger="change"
                       hx-vals='{"watchlist_id": "{{ item.watchlist_id }}"}'
                       hx-swap="none">
            </div>
        </div>
    </div>
</div>
{% empty %}
<p class="text-center text-slate-400 dark:text-zinc-500 text-xs py-4 font-semibold">No watchlist targets set</p>
{% endfor %}

<script>
    // Alpine variable update via script tag injection trick
    window.dispatchEvent(new CustomEvent('update-watchlist-count', { detail: Number("{{ items|length }}") }));
</script>
