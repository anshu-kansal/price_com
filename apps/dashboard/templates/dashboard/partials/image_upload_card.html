<div id="image-upload-panel" class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-3xl p-5 shadow-sm space-y-4">
    <div class="flex items-center justify-between border-b border-slate-100 dark:border-slate-800 pb-2 text-xs font-bold uppercase tracking-wider">
        <span class="flex items-center gap-1.5 text-emerald-600 dark:text-emerald-400">
            <i class="fas fa-camera"></i> Search by Image
        </span>
        <a href="{% url 'dashboard:visual_search' %}" class="text-[10px] text-slate-400 dark:text-slate-500 hover:text-emerald-600 dark:hover:text-emerald-400 transition font-semibold">Full Page →</a>
    </div>

    <form id="image-upload-form"
          class="flex flex-col space-y-3"
          hx-post="/dashboard/api/image-search/"
          hx-encoding="multipart/form-data"
          hx-target="#image-upload-panel"
          hx-swap="outerHTML"
          hx-indicator="#upload-spinner">
        {% csrf_token %}
        <div class="rounded-2xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 p-3">
            <div class="relative w-full h-32 flex items-center justify-center bg-white dark:bg-slate-900 border-2 border-dashed border-slate-200 dark:border-slate-700 hover:border-emerald-500 dark:hover:border-emerald-500 hover:bg-emerald-50/30 dark:hover:bg-emerald-900/10 rounded-xl transition cursor-pointer overflow-hidden" x-data="{ fileName: '' }">
                <input id="imgfile" type="file" name="image" accept="image/*" required
                       class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10"
                       @change="fileName = $event.target.files.length ? $event.target.files[0].name : ''">
                
                <div class="flex flex-col items-center p-4">
                    <i class="fas fa-camera text-xl text-slate-300 dark:text-slate-600 mb-1.5"></i>
                    <p class="text-slate-500 dark:text-slate-400 text-xs text-center" x-show="!fileName">Drop a screenshot or <span class="text-emerald-600 dark:text-emerald-400 font-semibold">browse</span></p>
                    <p class="text-emerald-600 dark:text-emerald-400 text-xs font-semibold truncate max-w-xs" x-show="fileName" x-text="fileName" x-cloak></p>
                </div>
            </div>
            <p class="text-[9px] text-slate-400 dark:text-slate-500 mt-2">JPG, PNG, WEBP — Max 5MB</p>
        </div>

        <button type="submit"
                class="w-full inline-flex items-center justify-center bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl px-4 py-2.5 text-xs font-bold shadow-sm transition">
            <span id="upload-spinner" class="htmx-indicator h-3 w-3 border-2 border-white border-t-transparent rounded-full animate-spin inline-block mr-2" x-cloak></span>
            <span><i class="fas fa-search mr-1.5"></i> Find Product</span>
        </button>
    </form>
</div>
