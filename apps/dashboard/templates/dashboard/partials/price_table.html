<div class="w-full flex flex-col h-full bg-white dark:bg-zinc-900 overflow-hidden">
    <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse whitespace-nowrap">
            <thead>
                <tr class="bg-slate-50 dark:bg-zinc-950 text-[10px] font-bold text-slate-400 dark:text-zinc-500 uppercase tracking-wider border-b border-slate-200 dark:border-zinc-800">
                    <th class="px-6 py-3.5 font-bold">Product</th>
                    <th class="px-6 py-3.5 font-bold">Seller</th>
                    <th class="px-6 py-3.5 font-bold">Store Price</th>
                    <th class="px-6 py-3.5 font-bold">Lowest Price</th>
                    <th class="px-6 py-3.5 font-bold">Price Delta</th>
                    <th class="px-6 py-3.5 text-right font-bold">Action</th>
                </tr>
            </thead>
            <tbody id="products-tbody" class="divide-y divide-slate-100 dark:divide-zinc-800 text-xs"
                hx-get="/dashboard/api/products/" hx-trigger="load" hx-swap="innerHTML">
                <tr>
                    <td colspan="6" class="px-6 py-16 text-center text-slate-400 dark:text-zinc-500">
                        <i class="fas fa-circle-notch fa-spin text-indigo-500 mr-2 text-base"></i>
                        <span class="animate-pulse tracking-wide font-medium">Acquiring market pricing vectors...</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
