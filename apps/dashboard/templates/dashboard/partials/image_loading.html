<div id="image-upload-panel" class="bg-white dark:bg-slate-900 border border-emerald-200 dark:border-emerald-900/30 rounded-3xl p-5 shadow-sm space-y-4">
    <div class="flex items-center justify-between border-b border-slate-100 dark:border-slate-800 pb-2">
        <div>
            <p class="text-[10px] uppercase font-bold text-emerald-600 dark:text-emerald-400 tracking-wider flex items-center gap-1.5">
                <i class="fas fa-camera"></i> Visual Search
            </p>
            <h3 id="image-processing-status" class="text-sm font-bold text-slate-800 dark:text-slate-200 mt-1">Identifying product...</h3>
        </div>
        <div class="text-[10px] text-slate-400 dark:text-slate-500 font-bold uppercase tracking-wider">Processing</div>
    </div>

    <div id="image-processing-spinner" class="flex items-center space-x-3 text-slate-500 dark:text-slate-400 text-xs">
        <span class="h-4 w-4 border-2 border-emerald-600 dark:border-emerald-400 border-t-transparent rounded-full animate-spin inline-block"></span>
        <span>Scanning image and matching products across stores...</span>
    </div>

    <!-- Mini Progress Steps -->
    <div class="flex items-center gap-1 mt-2">
        <div class="flex-1 h-1 bg-emerald-500 rounded-full animate-pulse"></div>
        <div class="flex-1 h-1 bg-emerald-500/50 rounded-full animate-pulse" style="animation-delay: 0.3s"></div>
        <div class="flex-1 h-1 bg-emerald-500/25 rounded-full animate-pulse" style="animation-delay: 0.6s"></div>
        <div class="flex-1 h-1 bg-slate-200 dark:bg-slate-700 rounded-full"></div>
    </div>

    <div class="mt-2 pt-2 border-t border-slate-100 dark:border-slate-800">
        <div id="image-polling-text" class="text-[10px] text-slate-400 dark:text-slate-500 font-mono">
            Task ID: {{ task_id|slice:":8" }}
        </div>
    </div>

    <script>
        if (typeof window.startImagePoll === 'function') {
            window.startImagePoll("{{ task_id }}");
        }
    </script>
</div>
