<div class="w-full flex flex-col bg-white dark:bg-zinc-900 overflow-hidden"
    x-data="{
        period: '7d',
        productId: null,
        loading: false,
        initId() {
            const seedEl = document.getElementById('chart-seed-data');
            if (seedEl) {
                const seedData = JSON.parse(seedEl.textContent);
                if (seedData.product_id) this.productId = seedData.product_id;
            }
        },
        updateChart(newPeriod) {
            if (!this.productId || this.loading) return;
            this.period = newPeriod;
            this.loading = true;
            fetch(`/dashboard/api/products/${this.productId}/history/?period=${newPeriod}`)
                .then(res => res.json())
                .then(data => {
                    if(window.priceHistoryChartRef && data.series) {
                        try {
                            window.priceHistoryChartRef.updateSeries(data.series);
                            window.priceHistoryChartRef.updateOptions({ xaxis: { categories: data.categories }});
                        } catch(e) { console.error('chart update error', e); }
                    }
                }).finally(() => { this.loading = false; });
        }
    }"
    x-init="initId()"
    @htmx:after-swap.document="initId()">
    <div class="flex items-center justify-between mb-6 pb-4 border-b border-slate-100 dark:border-zinc-800/60">
        <div>
            <h2 class="text-xs font-bold text-slate-400 dark:text-zinc-500 uppercase tracking-wider flex items-center gap-1.5 font-heading">
                <i class="fas fa-chart-line text-indigo-500 text-sm"></i> Price History Index
                <span id="current-product-display" class="ml-3 font-semibold text-slate-800 dark:text-zinc-200"></span>
                <i x-show="loading" class="fas fa-spinner fa-spin ml-2 text-indigo-500 text-xs"></i>
            </h2>
        </div>
        <div class="flex items-center bg-slate-50 dark:bg-zinc-950 border border-slate-200 dark:border-zinc-800/80 rounded-lg p-0.5 select-none">
            <button @click="updateChart('7d')"
                :class="period === '7d' ? 'bg-white dark:bg-zinc-800 text-indigo-600 dark:text-indigo-400 font-bold shadow-sm' : 'text-slate-500 dark:text-zinc-400 hover:text-slate-800 dark:hover:text-zinc-200'"
                class="px-3 py-1 rounded-md text-[10px] font-semibold transition focus:outline-none">7D</button>
            <button @click="updateChart('1m')"
                :class="period === '1m' ? 'bg-white dark:bg-zinc-800 text-indigo-600 dark:text-indigo-400 font-bold shadow-sm' : 'text-slate-500 dark:text-zinc-400 hover:text-slate-800 dark:hover:text-zinc-200'"
                class="px-3 py-1 rounded-md text-[10px] font-semibold transition focus:outline-none">1M</button>
            <button @click="updateChart('ytd')"
                :class="period === 'ytd' ? 'bg-white dark:bg-zinc-800 text-indigo-600 dark:text-indigo-400 font-bold shadow-sm' : 'text-slate-500 dark:text-zinc-400 hover:text-slate-800 dark:hover:text-zinc-200'"
                class="px-3 py-1 rounded-md text-[10px] font-semibold transition focus:outline-none">YTD</button>
        </div>
    </div>

    <div class="flex-1 w-full min-h-[300px] relative" id="chart-container">
        <!-- Chart placeholder div -->
        <div id="price-history-chart" class="w-full h-full"></div>
    </div>

    <div class="mt-4 text-[10px] font-semibold text-slate-400 dark:text-zinc-500 text-right">
        <span>Click on any catalog row below to load pricing analytics stream</span>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        if (typeof ApexCharts === 'undefined') {
            return;
        }

        const seedEl = document.getElementById('chart-seed-data');
        const seedData = seedEl ? JSON.parse(seedEl.textContent) : null;
        const initialSeries = (seedData && seedData.series && seedData.series.length)
            ? seedData.series
            : [
                { name: 'Amazon', data: [0, 0, 0, 0, 0, 0, 0] },
                { name: 'Flipkart', data: [0, 0, 0, 0, 0, 0, 0] }
            ];
        const initialCategories = (seedData && seedData.categories && seedData.categories.length)
            ? seedData.categories
            : ['-', '-', '-', '-', '-', '-', '-'];

        const chart = new ApexCharts(document.querySelector("#price-history-chart"), {
            series: initialSeries,
            chart: {
                id: 'priceHistoryChart',
                height: '100%',
                type: 'area',
                background: 'transparent',
                fontFamily: '"Plus Jakarta Sans", sans-serif',
                animations: { enabled: true, easing: 'easeinout', speed: 600 },
                toolbar: { show: false },
                zoom: { enabled: false }
            },
            colors: ['#6366f1', '#10b981', '#f43f5e', '#f59e0b', '#a855f7'],
            fill: {
                type: 'gradient',
                gradient: { shadeIntensity: 1, opacityFrom: 0.15, opacityTo: 0.0, stops: [0, 100] }
            },
            dataLabels: { enabled: false },
            stroke: { curve: 'smooth', width: 3 },
            grid: {
                borderColor: 'rgba(113, 113, 122, 0.12)',
                strokeDashArray: 4,
                xaxis: { lines: { show: true } },
                yaxis: { lines: { show: true } }
            },
            xaxis: {
                categories: initialCategories,
                axisBorder: { show: false },
                axisTicks: { show: false },
                labels: { 
                    style: { colors: '#71717a', fontSize: '9px', fontWeight: 600 }, 
                    rotate: -45,
                    hideOverlappingLabels: true,
                    trim: true
                },
                tickAmount: 8
            },
            yaxis: {
                forceNiceScale: true,
                labels: {
                    style: { colors: '#71717a', fontSize: '9px', fontWeight: 600 },
                    formatter: (val) => '₹' + Number(val).toLocaleString('en-IN')
                }
            },
            legend: {
                show: true,
                position: 'top',
                horizontalAlign: 'right',
                labels: { colors: '#71717a' },
                fontSize: '11px',
                fontWeight: 600,
                markers: { radius: 99, width: 8, height: 8 },
                itemMargin: { horizontal: 10 },
            },
            tooltip: {
                theme: 'dark',
                shared: true,
                intersect: false,
                marker: { show: true },
                x: { show: true },
                y: {
                    formatter: (val) => val != null ? '₹' + Number(val).toLocaleString('en-IN') : 'N/A'
                }
            },
            markers: { size: 0, strokeWidth: 0, hover: { size: 6 } },
        });

        chart.render();
        window.priceHistoryChartRef = chart;
    });
</script>
