<c-vars title="Metric" value="0" sublabel="detail" icon="fas fa-chart-bar" trend="" trend_type="neutral" />

<div class="bg-white dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 rounded-2xl p-5 flex flex-col justify-between shadow-sm relative group hover:shadow-md transition duration-200">
    <div class="flex items-center justify-between">
        <span class="text-xs font-bold text-slate-400 dark:text-zinc-500 uppercase tracking-wider">{{ title }}</span>
        <div class="w-8 h-8 rounded-lg bg-indigo-50 dark:bg-indigo-900/20 text-indigo-600 dark:text-indigo-400 flex items-center justify-center text-sm">
            <i class="{{ icon }}"></i>
        </div>
    </div>

    <div class="mt-4 flex items-baseline gap-2">
        <span class="text-2xl font-black text-slate-900 dark:text-white font-heading tracking-tight tabular-nums">{{ value }}</span>
        {% if trend %}
        <span class="px-2 py-0.5 rounded text-[10px] font-bold font-mono tracking-tight 
            {% if trend_type == 'success' or trend_type == 'up' %}bg-emerald-50 dark:bg-emerald-950/20 text-emerald-600 dark:text-emerald-400
            {% elif trend_type == 'danger' or trend_type == 'down' %}bg-red-50 dark:bg-red-950/20 text-red-600 dark:text-red-400
            {% else %}bg-slate-100 dark:bg-zinc-800 text-slate-500 dark:text-zinc-400{% endif %}">
            {{ trend }}
        </span>
        {% endif %}
    </div>

    <div class="mt-3 text-xs text-slate-400 dark:text-zinc-500 font-medium">
        {{ sublabel }}
    </div>
</div>
