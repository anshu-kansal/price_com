<div class="w-full max-w-4xl mx-auto flex flex-col items-center justify-center pt-8 pb-10" 
     x-data="{ ocrResult: null }">

    <!-- Title / Branding -->
    <div class="mb-8 text-center">
        <h1 class="text-3xl md:text-5xl font-black text-slate-900 dark:text-white tracking-tight uppercase mb-2 font-heading">
            Price<span class="text-indigo-600 dark:text-indigo-400">Com</span> Intelligence
        </h1>
        <p class="text-slate-400 dark:text-zinc-500 font-medium tracking-wide text-xs">
            Aggregated real-time pricing matrix for Amazon & Flipkart
        </p>
    </div>

    <!-- Search Bar Form with HTMX via POST -->
    <form hx-post="/dashboard/api/search/" hx-target="#search-results" hx-swap="innerHTML"
        hx-indicator="#search-spinner"
        class="w-full relative flex items-center bg-white dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 rounded-2xl shadow-sm hover:shadow-md transition-all px-2.5 py-2.5">

        {% csrf_token %}

        <!-- Input -->
        <div class="flex-1 flex items-center pl-3">
            <i class="fas fa-search text-slate-400 dark:text-zinc-500 text-lg mr-3"></i>
            <input type="hidden" name="layout" value="panel">
            <input type="text" name="q" placeholder="Enter product name, model SKU, or retail URL..."
                value="{{ persist_q|default:'' }}"
                class="w-full bg-transparent border-none text-base text-slate-800 dark:text-zinc-100 font-semibold focus:outline-none focus:ring-0 placeholder-slate-400 dark:placeholder-zinc-600">
        </div>

        <!-- OCR Camera Upload Button -->
        <button type="button"
            class="flex items-center justify-center h-10 w-10 border border-slate-100 dark:border-zinc-850 text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 rounded-xl transition mx-1 group"
            title="Scan product image"
            @click="$refs.ocrInput.click()">
            <i x-ref="camIcon" class="fas fa-camera text-base"></i>
        </button>
        <input type="file" x-ref="ocrInput" class="hidden" accept="image/*"
            @change="(e) => { 
                const f = e.target.files && e.target.files[0]; 
                if (!f) return; 
                
                const icon = $refs.camIcon;
                const oldClass = icon.className;
                icon.className = 'fas fa-spinner fa-spin text-indigo-500';
                
                const fd = new FormData(); 
                fd.append('image', f); 
                const csrftoken = document.querySelector('input[name=csrfmiddlewaretoken]')?.value; 
                
                fetch('/dashboard/api/image-search/', { 
                    method: 'POST', 
                    body: fd, 
                    headers: { 'X-Requested-With': 'XMLHttpRequest', 'X-CSRFToken': csrftoken } 
                })
                .then(r => {
                    if (!r.ok) { return r.json().then(err => Promise.reject(err)); }
                    return r.json();
                })
                .then(data => { 
                    icon.className = oldClass;
                    if (data.ocr_text) { 
                        document.querySelector('input[name=q]').value = data.ocr_text; 
                        setTimeout(() => $el.closest('form').dispatchEvent(new Event('submit', { cancelable: true, bubbles: true })), 300); 
                    } else if (data.task_id) { 
                        if (window.startImagePoll) {
                            window.startImagePoll(data.task_id);
                        } else {
                            console.error('Global startImagePoll function not found.');
                        }
                    } 
                })
                .catch(err => { 
                    icon.className = oldClass;
                    console.error('OCR upload failed', err); 
                    alert(err.error || 'Failed to identify image. Please try a different photo.');
                }); 
            }">

        <!-- Submit Button -->
        <button type="submit"
            class="bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold px-6 py-2.5 transition text-xs shadow-sm">
            <span class="indicator-label">Compare</span>
            <span class="indicator-progress hidden whitespace-nowrap"><i class="fas fa-spinner fa-spin"></i></span>
        </button>
    </form>

    <!-- Error/Loading indicators and dynamic container -->
    <div id="search-spinner" class="htmx-indicator mt-6 text-indigo-600 dark:text-indigo-400 font-bold text-xs uppercase tracking-wider animate-pulse flex items-center gap-2">
        <i class="fas fa-circle-notch fa-spin"></i> Querying Marketplace Catalog...
    </div>

    <!-- Container for HTMX search results -->
    <div id="search-results" class="w-full mt-6"></div>

    <!-- Quick Filters -->
    <div class="mt-6 flex flex-wrap justify-center gap-2.5 text-xs text-slate-500 dark:text-zinc-400 font-semibold select-none">
        <span class="px-2.5 py-1 rounded-full bg-white dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 hover:bg-slate-50 dark:hover:bg-zinc-800 cursor-pointer transition"
            @click="document.querySelector('input[name=q]').value = 'Electronics'; $el.closest('div').previousElementSibling.previousElementSibling.previousElementSibling.dispatchEvent(new Event('submit', {cancelable: true, bubbles: true}))">Electronics</span>
        
        <span class="px-2.5 py-1 rounded-full bg-white dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 hover:bg-slate-50 dark:hover:bg-zinc-800 cursor-pointer transition"
            @click="document.querySelector('input[name=q]').value = 'Apparel'; $el.closest('div').previousElementSibling.previousElementSibling.previousElementSibling.dispatchEvent(new Event('submit', {cancelable: true, bubbles: true}))">Apparel</span>
        
        <span class="px-2.5 py-1 rounded-full bg-white dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 hover:bg-slate-50 dark:hover:bg-zinc-800 cursor-pointer transition"
            @click="document.querySelector('input[name=q]').value = 'Home Goods'; $el.closest('div').previousElementSibling.previousElementSibling.previousElementSibling.dispatchEvent(new Event('submit', {cancelable: true, bubbles: true}))">Home Goods</span>
        
        <span class="px-2.5 py-1 rounded-full bg-indigo-50 dark:bg-indigo-900/10 border border-indigo-100 dark:border-indigo-900/20 text-indigo-600 dark:text-indigo-400 hover:bg-indigo-100/50 cursor-pointer transition"
            @click="document.querySelector('input[name=q]').value = 'Flash Sales Today'; $el.closest('div').previousElementSibling.previousElementSibling.previousElementSibling.dispatchEvent(new Event('submit', {cancelable: true, bubbles: true}))">Flash Sales</span>
    </div>
</div>

<style>
    /* Spinner handling classes */
    form.htmx-request .indicator-label {
        display: none;
    }

    form.htmx-request .indicator-progress {
        display: inline-block !important;
    }
</style>
